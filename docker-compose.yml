version: "3.9"

services:
  ytworkflo:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - CORS_ORIGINS=["*"]
      - DOWNLOAD_DIR=/tmp/ytworkflo/downloads
      - AUDIO_DIR=/tmp/ytworkflo/audio
      - SUBTITLE_DIR=/tmp/ytworkflo/subtitles
      - THUMBNAIL_DIR=/tmp/ytworkflo/thumbnails
    volumes:
      - ytworkflo_downloads:/tmp/ytworkflo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ytworkflo_downloads:
